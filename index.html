<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Кафедра ПОКС — КГТУ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 id="dept-name">Кафедра ПОКС</h1>
      <p id="dept-sub" class="muted"></p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="dirs"><i data-lucide="graduation-cap"></i><span>Направления</span></button>
      <button class="tab" data-tab="faq"><i data-lucide="help-circle"></i><span>FAQ</span></button>
      <button class="tab" data-tab="contacts"><i data-lucide="phone"></i><span>Контакты</span></button>
    </nav>

    <section id="tab-dirs" class="tab-content active">
      <div class="filters">
        <div class="search-box">
          <i data-lucide="search"></i>
          <input id="search" type="search" placeholder="Поиск по направлениям...">
        </div>
        <div class="filter-group">
          <span class="filter-label">Уровень</span>
          <div class="chips" id="level-chips"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">Язык обучения</span>
          <div class="chips" id="lang-chips">
            <button class="chip" data-lang="all">Все языки</button>
            <button class="chip" data-lang="ru">Русский</button>
            <button class="chip" data-lang="en">Английский</button>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="budget-only">
          <span>Только с бюджетными местами</span>
        </label>
      </div>
      <div id="dirs-list"></div>
    </section>

    <section id="tab-faq" class="tab-content">
      <div id="faq-list"></div>
    </section>

    <section id="tab-contacts" class="tab-content">
      <div id="contacts-block"></div>
    </section>

    <footer class="muted">КГТУ им. И. Раззакова · Институт информационных технологий</footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
